<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="400" height="250" role="img" aria-label="Stylized Budapest skyline at dusk">
  <defs>
    <linearGradient id="duskSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c0d16"/>
      <stop offset="45%" stop-color="#1c1622"/>
      <stop offset="75%" stop-color="#3a2020"/>
      <stop offset="100%" stop-color="#1a1010"/>
    </linearGradient>
    <radialGradient id="duskGlow" cx="70%" cy="70%" r="55%">
      <stop offset="0%" stop-color="#6b3a2a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#6b3a2a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="riverGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#20242c"/>
      <stop offset="100%" stop-color="#0a0b0e"/>
    </linearGradient>
  </defs>

  <!-- sky -->
  <rect x="0" y="0" width="400" height="250" fill="url(#duskSky)"/>
  <circle cx="290" cy="170" r="70" fill="url(#duskGlow)"/>
  <!-- low moon -->
  <circle cx="300" cy="60" r="14" fill="#cfc6b8" opacity="0.85"/>
  <circle cx="300" cy="60" r="14" fill="#0c0d16" opacity="0.12"/>

  <!-- distant hill silhouette (Buda side) -->
  <path d="M0 175 C40 160 80 168 120 158 C160 150 190 168 230 172 L230 250 L0 250 Z" fill="#100a0d" opacity="0.9"/>

  <!-- Hungarian Parliament-style building silhouette, left-of-center -->
  <g fill="#0b0a0d">
    <!-- base wing -->
    <rect x="30" y="168" width="180" height="34" />
    <!-- facade rhythm: small arched windows -->
    <g fill="#1c141a">
      <rect x="40" y="176" width="6" height="14" rx="3"/>
      <rect x="54" y="176" width="6" height="14" rx="3"/>
      <rect x="68" y="176" width="6" height="14" rx="3"/>
      <rect x="82" y="176" width="6" height="14" rx="3"/>
      <rect x="158" y="176" width="6" height="14" rx="3"/>
      <rect x="172" y="176" width="6" height="14" rx="3"/>
      <rect x="186" y="176" width="6" height="14" rx="3"/>
      <rect x="200" y="176" width="6" height="14" rx="3"/>
    </g>
    <!-- corner turrets -->
    <path d="M30 168 L30 140 L38 130 L46 140 L46 168 Z"/>
    <path d="M194 168 L194 140 L202 130 L210 140 L210 168 Z"/>
    <circle cx="38" cy="128" r="4"/>
    <circle cx="202" cy="128" r="4"/>
    <!-- central dome -->
    <path d="M96 168 L96 120 C96 100 112 88 120 88 C128 88 144 100 144 120 L144 168 Z"/>
    <path d="M120 60 C132 60 140 72 140 88 L100 88 C100 72 108 60 120 60 Z"/>
    <rect x="116" y="46" width="8" height="18"/>
    <circle cx="120" cy="44" r="4"/>
    <!-- flanking minor spires -->
    <path d="M60 168 L60 150 L66 142 L72 150 L72 168 Z"/>
    <path d="M168 168 L168 150 L174 142 L180 150 L180 168 Z"/>
  </g>

  <!-- Chain Bridge, right side, spanning toward the river -->
  <g stroke="#0b0a0d" fill="none" stroke-width="3">
    <!-- pylons -->
    <path d="M260 205 L260 130 M276 205 L276 130" stroke-width="5"/>
    <path d="M252 130 L284 130" stroke-width="5"/>
    <path d="M340 205 L340 130 M356 205 L356 130" stroke-width="5"/>
    <path d="M332 130 L364 130" stroke-width="5"/>
    <!-- main suspension curve -->
    <path d="M215 200 C240 150 300 150 300 130" />
    <path d="M300 130 C300 150 360 150 400 200" />
    <!-- deck -->
    <path d="M210 205 L400 205" stroke-width="4"/>
    <!-- hangers -->
    <g stroke-width="1.5" opacity="0.8">
      <path d="M235 205 L238 172"/>
      <path d="M250 205 L252 158"/>
      <path d="M264 205 L266 140"/>
      <path d="M292 205 L295 133"/>
      <path d="M310 205 L308 133"/>
      <path d="M335 205 L333 140"/>
      <path d="M352 205 L350 158"/>
      <path d="M368 205 L365 172"/>
    </g>
  </g>

  <!-- river with reflected glow -->
  <rect x="0" y="205" width="400" height="45" fill="url(#riverGrad)"/>
  <path d="M240 214 L320 214 L340 224 L220 224 Z" fill="#5c3324" opacity="0.35"/>
  <path d="M0 216 L400 216" stroke="#2a1c18" stroke-width="1" opacity="0.5"/>
  <path d="M0 230 L400 230" stroke="#1a1210" stroke-width="1" opacity="0.4"/>
</svg>
