<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Stylized world college crest">
  <defs>
    <linearGradient id="uwcFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#151b22"/>
      <stop offset="55%" stop-color="#0f151b"/>
      <stop offset="100%" stop-color="#080b0e"/>
    </linearGradient>
    <linearGradient id="uwcEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#33424f"/>
      <stop offset="100%" stop-color="#131a1f"/>
    </linearGradient>
    <radialGradient id="uwcVignette" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>
  </defs>

  <!-- outer roundel ring -->
  <circle cx="100" cy="100" r="86" fill="url(#uwcEdge)" stroke="#080b0e" stroke-width="3"/>
  <!-- inner face -->
  <circle cx="100" cy="100" r="72" fill="url(#uwcFace)" stroke="#1a2329" stroke-width="2"/>

  <!-- latitude/meridian lines evoking a globe -->
  <g stroke="#3a4a56" stroke-width="1.5" fill="none" opacity="0.8">
    <ellipse cx="100" cy="100" rx="72" ry="26"/>
    <ellipse cx="100" cy="100" rx="72" ry="50"/>
    <ellipse cx="100" cy="100" rx="26" ry="72"/>
    <ellipse cx="100" cy="100" rx="50" ry="72"/>
  </g>
  <line x1="28" y1="100" x2="172" y2="100" stroke="#3a4a56" stroke-width="1.5" opacity="0.8"/>
  <line x1="100" y1="28" x2="100" y2="172" stroke="#3a4a56" stroke-width="1.5" opacity="0.8"/>

  <!-- torch / flame motif at center, common to UWC-style badges -->
  <path d="M100 58
           C112 70 116 82 108 92
           C114 96 116 104 110 110
           C106 114 100 114 96 110
           C90 104 92 96 98 92
           C90 82 94 70 100 58 Z"
        fill="#7a2e20" opacity="0.9"/>
  <path d="M100 70
           C106 78 108 86 102 92
           C98 88 96 82 100 70Z"
        fill="#b5502f" opacity="0.85"/>
  <rect x="94" y="112" width="12" height="30" rx="2" fill="#4a3f30"/>
  <path d="M84 142 h32 l-4 8 h-24 Z" fill="#4a3f30"/>

  <!-- laurel wreath -->
  <path d="M60 150 C50 138 46 120 52 104" stroke="#3a4032" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M140 150 C150 138 154 120 148 104" stroke="#3a4032" stroke-width="3" fill="none" stroke-linecap="round"/>
  <g stroke="#3a4032" stroke-width="2" stroke-linecap="round">
    <path d="M52 104 L60 100 M54 116 L62 113 M58 130 L65 128 M60 142 L66 141"/>
    <path d="M148 104 L140 100 M146 116 L138 113 M142 130 L135 128 M140 142 L134 141"/>
  </g>

  <rect x="0" y="0" width="200" height="200" fill="url(#uwcVignette)"/>
</svg>
