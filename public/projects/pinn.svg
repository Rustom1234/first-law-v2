<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="400" height="250">
  <defs>
    <linearGradient id="pinn-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1a17"/>
      <stop offset="1" stop-color="#14130f"/>
    </linearGradient>
  </defs>

  <rect width="400" height="250" fill="url(#pinn-bg)"/>

  <!-- faint grid suggesting a discretized field/domain -->
  <g stroke="#26251f" stroke-width="1">
    <line x1="0" y1="60" x2="400" y2="60"/>
    <line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="180" x2="400" y2="180"/>
    <line x1="80" y1="0" x2="80" y2="250"/>
    <line x1="160" y1="0" x2="160" y2="250"/>
    <line x1="240" y1="0" x2="240" y2="250"/>
    <line x1="320" y1="0" x2="320" y2="250"/>
  </g>

  <!-- governing wave/field solution, a standing wave -->
  <path d="M0 130 C 30 90, 60 90, 90 130 S 150 170, 180 130 S 240 90, 270 130 S 330 170, 360 130 S 400 100, 400 130"
        fill="none" stroke="#9fb0b8" stroke-width="2"/>
  <path d="M0 140 C 30 175, 60 175, 90 140 S 150 105, 180 140 S 240 175, 270 140 S 330 105, 360 140 S 400 165, 400 140"
        fill="none" stroke="#5a6570" stroke-width="1.5" stroke-dasharray="2 4" opacity="0.8"/>

  <!-- small MLP diagram overlaid, representing the network approximating the field -->
  <g transform="translate(150,60)">
    <!-- input layer -->
    <circle cx="0" cy="0" r="4" fill="#14130f" stroke="#d9b98c" stroke-width="1.4"/>
    <circle cx="0" cy="24" r="4" fill="#14130f" stroke="#d9b98c" stroke-width="1.4"/>
    <!-- hidden layer -->
    <circle cx="40" cy="-12" r="4" fill="#14130f" stroke="#e7e5df" stroke-width="1.4"/>
    <circle cx="40" cy="12" r="4" fill="#14130f" stroke="#e7e5df" stroke-width="1.4"/>
    <circle cx="40" cy="36" r="4" fill="#14130f" stroke="#e7e5df" stroke-width="1.4"/>
    <!-- output layer -->
    <circle cx="80" cy="12" r="4" fill="#14130f" stroke="#d9b98c" stroke-width="1.4"/>

    <!-- connections -->
    <g stroke="#6b6a63" stroke-width="0.8">
      <line x1="4" y1="0" x2="36" y2="-12"/>
      <line x1="4" y1="0" x2="36" y2="12"/>
      <line x1="4" y1="0" x2="36" y2="36"/>
      <line x1="4" y1="24" x2="36" y2="-12"/>
      <line x1="4" y1="24" x2="36" y2="12"/>
      <line x1="4" y1="24" x2="36" y2="36"/>
      <line x1="44" y1="-12" x2="76" y2="12"/>
      <line x1="44" y1="12" x2="76" y2="12"/>
      <line x1="44" y1="36" x2="76" y2="12"/>
    </g>
  </g>

  <!-- PDE residual annotation -->
  <g font-family="'Courier New', monospace" fill="#8f8a7c" font-size="12">
    <text x="255" y="55">∂u/∂t = α ∇²u</text>
  </g>
  <g font-family="'Courier New', monospace" fill="#6b6a63" font-size="10">
    <text x="255" y="72">residual → loss</text>
  </g>

  <!-- baseline axis -->
  <line x1="0" y1="205" x2="400" y2="205" stroke="#2a2822" stroke-width="1"/>
</svg>
